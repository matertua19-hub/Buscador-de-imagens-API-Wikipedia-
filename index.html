<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Multi-Asset Search: Imagens & Ícones</title>
    <style>
        :root { --blue: #1a73e8; --cyan: #00e5ff; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; max-width: 900px; margin: 30px auto; padding: 20px; }
        .container { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { width: 100%; height: 120px; background: #2d2d2d; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 12px; font-size: 16px; margin-bottom: 15px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; }
        .btn-img { background: var(--blue); }
        .btn-icon { background: var(--cyan); color: #000; }
        h3 { border-bottom: 2px solid #444; padding-bottom: 10px; margin-top: 30px; color: var(--blue); }
        .icon-title { color: var(--cyan) !important; }
        pre { background: #000; padding: 15px; border-radius: 8px; white-space: pre-wrap; word-wrap: break-word; font-family: monospace; color: #adadad; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🛠️ Multi-Asset Command Center</h2>
        <textarea id="inputTemas" placeholder="Ex: tank, churchill, world war, map..."></textarea>
        
        <div class="btn-group">
            <button class="btn-img" onclick="processar('imagem')">Buscar Imagens (Wikipedia)</button>
            <button class="btn-icon" onclick="processar('icone')">Gerar Ícones (Iconify)</button>
        </div>

        <h3 id="labelResult">Resultados:</h3>
        <pre id="display">Aguardando comando...</pre>
    </div>

    <script>
        const API_VERCEL = "https://buscador-de-imagens-api-wikipedia.vercel.app";

        async function processar(tipo) {
            const texto = document.getElementById('inputTemas').value;
            const termos = texto.split(/[\n,]+/).map(t => t.trim()).filter(t => t !== "");
            const display = document.getElementById('display');
            const label = document.getElementById('labelResult');
            
            if (termos.length === 0) return;
            
            display.innerText = "🔍 Processando lote...";
            let resultadoFinal = "";

            if (tipo === 'imagem') {
                label.innerText = "🖼️ URLs de Imagens (Wikipedia):";
                label.className = "";
                for (let termo of termos) {
                    try {
                        const res = await fetch(`${API_VERCEL}/buscar/${encodeURIComponent(termo)}`);
                        const data = await res.json();
                        resultadoFinal += `${termo}: ${data.link}\n`;
                    } catch (e) { resultadoFinal += `${termo}: (Erro na API)\n`; }
                }
            } else {
                label.innerText = "🎨 URLs de Ícones (Iconify - MDI):";
                label.className = "icon-title";
                for (let termo of termos) {
                    // O Iconify usa nomes de ícones em inglês e sem espaços.
                    // Vamos tentar formatar o termo para um slug simples.
                    const iconName = termo.toLowerCase().replace(/\s+/g, '-');
                    const urlIcone = `https://api.iconify.design/mdi/${iconName}.svg`;
                    resultadoFinal += `${termo}: ${urlIcone}\n`;
                }
            }
            display.innerText = resultadoFinal;
        }
    </script>
</body>
</html>
