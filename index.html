<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Buscador de Imagens em Lote - IA Helper</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; line-height: 1.6; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; margin-top: 0; }
        textarea { width: 100%; height: 180px; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; resize: vertical; }
        button { background-color: #1a73e8; color: white; padding: 12px 24px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        button:hover { background-color: #1557b0; }
        #resultados { margin-top: 25px; background: #282c34; color: #61dafb; padding: 20px; border-radius: 8px; min-height: 100px; font-family: 'Courier New', Courier, monospace; overflow-x: auto; }
        .instrucao { font-size: 0.9em; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 Buscador de Imagens em Lote</h2>
        <p class="instrucao">Cole os temas sugeridos pela LLM (separados por vírgula ou linha):</p>
        
        <textarea id="inputTemas" placeholder="Ex: Maceió, Praia do Francês, Rio São Francisco..."></textarea>
        
        <button id="btnBuscar">Buscar URLs de Imagens</button>

        <h3>📋 Resultado para Copiar:</h3>
        <div id="resultados">Os links prontos aparecerão aqui...</div>
    </div>

    <script>
        // O MOTOR DO SITE COMEÇA AQUI
        const btn = document.getElementById('btnBuscar');
        const display = document.getElementById('resultados');
        const input = document.getElementById('inputTemas');

        btn.onclick = async () => {
            const texto = input.value;
            const termos = texto.split(/[\n,]+/).map(t => t.trim()).filter(t => t !== "");
            
            if (termos.length === 0) {
                display.innerText = "Por favor, cole algum tema primeiro!";
                return;
            }

            display.innerHTML = "🔍 Buscando imagens na Wikipedia... aguarde.";
            let linksFormatados = "";

            // URL DA SUA API NO VERCEL
            const URL_BASE = "https://buscador-de-imagens-api-wikipedia.vercel.app";

            for (let termo of termos) {
                try {
                    // Faz a chamada para a sua rota /buscar/{q}
                    const response = await fetch(`${URL_BASE}/buscar/${encodeURIComponent(termo)}`);
                    const data = await response.json();

                    if (data.link && data.link.includes("http")) {
                        linksFormatados += `${termo}: ${data.link}\n`;
                    } else {
                        linksFormatados += `${termo}: (Não encontrado)\n`;
                    }
                } catch (error) {
                    linksFormatados += `${termo}: (Erro de conexão)\n`;
                }
            }

            display.innerText = linksFormatados || "Nenhum resultado encontrado.";
        };
    </script>
</body>
</html>
