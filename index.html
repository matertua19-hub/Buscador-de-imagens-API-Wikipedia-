<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Asset Command Center</title>
    <style>
        :root { --blue: #3b82f6; --cyan: #06b6d4; --pink: #ec4899; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: #f1f5f9; max-width: 800px; margin: 20px auto; padding: 15px; }
        .card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #fff; margin-bottom: 20px; font-weight: 800; }
        textarea { width: 100%; height: 120px; background: #0f172a; color: #94a3b8; border: 2px solid #334155; border-radius: 12px; padding: 12px; font-size: 16px; box-sizing: border-box; transition: 0.3s; }
        textarea:focus { border-color: var(--blue); outline: none; color: #fff; }
        .grid-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        button { padding: 14px 5px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; transition: all 0.2s; font-size: 13px; color: white; text-transform: uppercase; }
        button:active { transform: scale(0.95); }
        .b-img { background: var(--blue); } .b-icon { background: var(--cyan); color: #000; } .b-gif { background: var(--pink); }
        .res-container { margin-top: 25px; position: relative; }
        .res-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        pre { background: #020617; padding: 15px; border-radius: 12px; font-family: 'Fira Code', monospace; font-size: 13px; color: #38bdf8; overflow-x: auto; white-space: pre-wrap; border: 1px solid #1e293b; min-height: 100px; }
        .copy-hint { font-size: 11px; color: #64748b; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 Asset Command Center</h2>
    <textarea id="inputTemas" placeholder="Ex: tank, world war, beach, maceio..."></textarea>
    
    <div class="grid-btns">
        <button class="b-img" onclick="processar('imagem')">🖼️ Imagens</button>
        <button class="b-icon" onclick="processar('icone')">🎨 Ícones</button>
        <button class="b-gif" onclick="processar('gif')">🎬 GIFs</button>
    </div>

    <div class="res-container">
        <div class="res-header">
            <span id="labelType" style="font-weight: bold; color: #94a3b8;">Resultados:</span>
            <span class="copy-hint">Toque e segure para copiar</span>
        </div>
        <pre id="display">Aguardando entrada...</pre>
    </div>
</div>

<script>
    const API_VERCEL = "https://buscador-de-imagens-api-wikipedia.vercel.app";

    async function processar(tipo) {
        const input = document.getElementById('inputTemas');
        const display = document.getElementById('display');
        const label = document.getElementById('labelType');
        
        const termos = input.value.split(/[\n,]+/).map(t => t.trim()).filter(t => t !== "");
        if (termos.length === 0) return;

        display.innerText = "⏳ A processar...";
        let buffer = "";

        if (tipo === 'imagem') {
            label.innerText = "🖼️ URLs DA WIKIPEDIA:";
            label.style.color = "#3b82f6";
            for (let t of termos) {
                try {
                    const r = await fetch(`${API_VERCEL}/buscar/${encodeURIComponent(t)}`);
                    const d = await r.json();
                    buffer += `${t}: ${d.link}\n`;
                } catch { buffer += `${t}: (Erro na API)\n`; }
                display.innerText = buffer;
            }
        } 
        else if (tipo === 'icone') {
            label.innerText = "🎨 URLs DO ICONIFY (MDI):";
            label.style.color = "#06b6d4";
            termos.forEach(t => {
                const slug = t.toLowerCase().replace(/\s+/g, '-');
                buffer += `${t}: https://api.iconify.design/mdi/${slug}.svg\n`;
            });
            display.innerText = buffer;
        }
        else if (tipo === 'gif') {
            label.innerText = "🎬 URLs DE GIFs (SEARCH):";
            label.style.color = "#ec4899";
            termos.forEach(t => {
                const slug = t.toLowerCase().replace(/\s+/g, '+');
                // Link otimizado para busca rápida
                buffer += `${t}: https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJocXQz/.../giphy.gif (Busca: ${t})\n`;
                // Como o Giphy requer ID, fornecemos um link de busca funcional para a LLM:
                buffer += `Link Direto ${t}: https://giphy.com/search/${slug}\n\n`;
            });
            display.innerText = buffer;
        }
    }
</script>

</body>
</html>
